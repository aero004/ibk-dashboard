<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TAS — Jonli parvozlar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;-webkit-font-smoothing:antialiased}
:root{
  --bg:#08111e;--panel:#0e1c30;--panel2:#111d33;--bd:#1a3050;--txt:#ddeaff;--sub:#7898bc;
  --arr:#2fd8c0;--dep:#f6a93b;--live:#6ea8ff;--sched:#94a3b8;--land:#22c55e;
  --hd:#091828;--alt:rgba(255,255,255,.02);
  --btn:#162540;--bact:#1d4ed8;--btxt:#7898bc;
}
.light{
  --bg:#eef3fb;--panel:#fff;--panel2:#f3f7fc;--bd:#cdd8ea;--txt:#18273a;--sub:#5a7090;
  --arr:#0d9488;--dep:#b45309;--live:#2563eb;--sched:#64748b;--land:#16a34a;
  --hd:#e4edf8;--alt:rgba(0,0,0,.015);
  --btn:#e4edf8;--bact:#1d4ed8;--btxt:#5a7090;
}
#wrap{display:flex;flex-direction:column;height:100%;background:var(--bg);color:var(--txt);transition:background .2s,color .2s}
#hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:7px 14px;background:var(--panel);border-bottom:1px solid var(--bd)}
#hdr-title .t{font-size:13.5px;font-weight:700}
#hdr-title .s{font-size:10px;color:var(--sub);margin-top:1px}
#hdr-right{display:flex;align-items:center;gap:7px;margin-left:auto}
.seg{display:flex;gap:2px;padding:3px;border-radius:8px;background:var(--btn);border:1px solid var(--bd)}
.sb{appearance:none;border:none;cursor:pointer;padding:5px 11px;border-radius:6px;font-size:11.5px;font-weight:600;transition:.15s;background:transparent;color:var(--btxt)}
.sb.on{background:var(--bact);color:#fff}
.th-btn{appearance:none;border:1px solid var(--bd);cursor:pointer;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--btn);color:var(--txt);white-space:nowrap}
#sbar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:4px 14px;background:var(--panel2);border-bottom:1px solid var(--bd);font-size:10.5px;color:var(--sub)}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background .3s}
.dot.ld{background:#f59e0b;animation:blink 1s infinite}
.dot.err{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.ref-btn{appearance:none;border:1px solid var(--bd);cursor:pointer;padding:2px 8px;border-radius:5px;font-size:10.5px;background:var(--btn);color:var(--sub)}
.ref-btn:hover{color:var(--txt)}
#stime{margin-left:auto;font-size:10px}
#content{flex:1;overflow:hidden;position:relative}
#radarCv{position:absolute;inset:0;width:100%;height:100%;display:none}
#xaritaEl{position:absolute;inset:0;display:none}
#tabloEl{position:absolute;inset:0;overflow-y:auto;padding:10px 14px;display:none;flex-direction:column;gap:10px}
.bcard{background:var(--panel);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.bhead{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--hd);border-bottom:1px solid var(--bd)}
.bhead .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.bhead .cnt{margin-left:auto;font-size:10px;color:var(--sub)}
table{width:100%;border-collapse:collapse}
th{background:var(--hd);font-size:10.5px;font-weight:700;color:var(--sub);text-align:left;padding:5px 10px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{font-size:11.5px;padding:7px 10px;border-bottom:1px solid var(--bd);color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:var(--alt)}
.fn{font-family:monospace;font-weight:700;font-size:12.5px;letter-spacing:.03em}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.s-land{background:rgba(34,197,94,.15);color:#22c55e}
.s-live{background:rgba(110,168,255,.15);color:#6ea8ff}
.s-sched{background:rgba(148,163,184,.12);color:#94a3b8}
.s-dep{background:rgba(246,169,59,.12);color:#f6a93b}
.empty{text-align:center;padding:18px;color:var(--sub);font-size:12px}
.ac-txt{font-size:10.5px;color:var(--sub)}
.lf-dark .leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(.82) contrast(1.1) saturate(.85)}
.leaflet-popup-content-wrapper{background:var(--panel)!important;border:1px solid var(--bd)!important;color:var(--txt)!important;border-radius:8px!important;box-shadow:0 4px 16px rgba(0,0,0,.4)!important}
.leaflet-popup-tip{background:var(--panel)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:12px!important;line-height:1.6!important}
.popup-flight{font-weight:700;font-size:14px;margin-bottom:4px}
.popup-route{color:var(--sub);font-size:11px}
</style>
</head>
<body>
<div id="wrap">
  <div id="hdr">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--arr)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>
    <div id="hdr-title">
      <div class="t">Toshkent (TAS) — Jonli parvozlar</div>
      <div class="s">Islom Karimov xalqaro aeroporti · UTTT · FlightRadar24</div>
    </div>
    <div id="hdr-right">
      <div class="seg" id="vSeg">
        <button class="sb" onclick="setView('tablo')">Jadval</button>
        <button class="sb" onclick="setView('radar')">Radar</button>
        <button class="sb on" onclick="setView('xarita')">Xarita</button>
      </div>
      <button class="th-btn" id="thBtn" onclick="toggleTheme()">☀ Yorug'</button>
    </div>
  </div>
  <div id="sbar">
    <div class="dot ld" id="sDot"></div>
    <span id="sTxt">Yuklanmoqda...</span>
    <button class="ref-btn" onclick="fetchData(true)">↻</button>
    <span id="stime"></span>
  </div>
  <div id="content">
    <canvas id="radarCv"></canvas>
    <div id="xaritaEl"></div>
    <div id="tabloEl"></div>
  </div>
</div>
<script>
const TOKEN=new URLSearchParams(location.search).get('token')||'';
const UTTT={lat:41.2579,lon:69.2819};

const S={
  theme:'dark',view:'xarita',
  arrivals:[],departures:[],planes:[],
  updAt:0,loading:false,error:'',
  map:null,layers:[],tileLayer:null,rafId:null,sweep:0,
};

function toggleTheme(){
  S.theme=S.theme==='dark'?'light':'dark';
  document.getElementById('wrap').classList.toggle('light',S.theme==='light');
  document.getElementById('thBtn').textContent=S.theme==='dark'?"☀ Yorug'":'🌙 Qorongʼi';
  applyMapTheme();
  if(S.view==='radar')drawRadar();
}

const VIEWS=['tablo','radar','xarita'];
function setView(v){
  S.view=v;
  document.querySelectorAll('#vSeg .sb').forEach((b,i)=>b.classList.toggle('on',VIEWS[i]===v));
  document.getElementById('radarCv').style.display=v==='radar'?'block':'none';
  document.getElementById('xaritaEl').style.display=v==='xarita'?'block':'none';
  document.getElementById('tabloEl').style.display=v==='tablo'?'flex':'none';
  if(v==='radar')startRadar(); else stopRadar();
  if(v==='xarita')initMap();
  if(v==='tablo')renderTablo();
}

function setStatus(st,msg){
  const d=document.getElementById('sDot');
  d.className='dot'+(st==='ld'?' ld':st==='err'?' err':'');
  document.getElementById('sTxt').textContent=msg;
  if(S.updAt){
    const t=new Date(S.updAt*1000);
    document.getElementById('stime').textContent='Yangilangan: '+t.toLocaleTimeString('uz-Latn',{hour:'2-digit',minute:'2-digit'});
  }
}

function fmtTs(ts){
  if(!ts)return'—';
  const d=new Date(ts*1000);
  return d.toLocaleTimeString('uz-Latn',{hour:'2-digit',minute:'2-digit'});
}

function statusTag(f,typ){
  const sc=f.status_color||'gray', st=f.status_type||'';
  const txt=f.status_text||'—';
  if(sc==='green'||st==='landed'||st==='arrived')return`<span class="tag s-land">✓ ${txt}</span>`;
  if(f.live&&(st==='en-route'||st==='boarding'||sc==='yellow'||sc==='blue'))return`<span class="tag s-live">✈ ${txt}</span>`;
  if(st==='scheduled'||sc==='gray')return`<span class="tag s-sched">${txt}</span>`;
  return`<span class="tag s-dep">${txt}</span>`;
}

function routeLabel(f,typ){
  const name=f.airport_name||'';
  const city=f.city||f.country||'';
  const code=typ==='arr'?f.from:f.to;
  if(city)return`${city} (${code})`;
  if(name)return name.replace(' Airport','').replace(' International','');
  return code||'—';
}

function renderTablo(){
  const wrap=document.getElementById('tabloEl');if(!wrap)return;
  function rows(list,typ){
    if(!list.length)return`<tr><td colspan="5" class="empty">Ma'lumot yo'q</td></tr>`;
    const sorted=[...list].sort((a,b)=>{
      const pa=a.status_color==='green'?0:a.live?1:2;
      const pb=b.status_color==='green'?0:b.live?1:2;
      return pa-pb;
    });
    return sorted.map(f=>{
      const ts=typ==='arr'?f.last_seen:f.first_seen;
      const gt=f.gate?`<span class="ac-txt"> · Eshik ${f.gate}</span>`:'';
      const ter=f.terminal?`<span class="ac-txt">T${f.terminal}</span> `:'';
      return`<tr>
        <td><span class="fn">${f.flight||f.callsign||'—'}</span></td>
        <td>${routeLabel(f,typ)}</td>
        <td>${statusTag(f,typ)}</td>
        <td style="font-variant-numeric:tabular-nums;font-size:12px">${ter}${fmtTs(ts)}${gt}</td>
        <td class="ac-txt">${f.aircraft||'—'}</td>
      </tr>`;
    }).join('');
  }
  const liveArr=S.arrivals.filter(f=>f.live).length;
  const liveDep=S.departures.filter(f=>f.live).length;
  wrap.innerHTML=`
    <div class="bcard">
      <div class="bhead">
        <span style="color:var(--arr);font-size:14px">↓</span>
        <span class="lbl" style="color:var(--arr)">Kelib tushish</span>
        <span style="color:var(--sub);font-size:10px;font-weight:400"> · Arrivals</span>
        <span class="cnt">${S.arrivals.length} reys${liveArr?` · <span style="color:var(--live)">${liveArr} havoda</span>`:''}
      </span></div>
      <table><thead><tr><th>Reys №</th><th>Qaerdan</th><th>Holat</th><th>Vaqt</th><th>Samolyot</th></tr></thead>
      <tbody>${rows(S.arrivals,'arr')}</tbody></table>
    </div>
    <div class="bcard">
      <div class="bhead">
        <span style="color:var(--dep);font-size:14px">↑</span>
        <span class="lbl" style="color:var(--dep)">Uchib ketish</span>
        <span style="color:var(--sub);font-size:10px;font-weight:400"> · Departures</span>
        <span class="cnt">${S.departures.length} reys${liveDep?` · <span style="color:var(--live)">${liveDep} havoda</span>`:''}
      </span></div>
      <table><thead><tr><th>Reys №</th><th>Qayerga</th><th>Holat</th><th>Vaqt</th><th>Samolyot</th></tr></thead>
      <tbody>${rows(S.departures,'dep')}</tbody></table>
    </div>
    <div style="text-align:center;padding:6px 0;font-size:10px;color:var(--sub)">Manba: FlightRadar24 · Har 60 soniyada yangilanadi</div>`;
}

// ── Radar ──────────────────────────────────────────────
const MAX_KM=700;
function toR(d){return d*Math.PI/180}
function distKm(a,b,c,d){
  const R=6371,dL=toR(c-a),dl=toR(d-b),x=Math.sin(dL/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dl/2)**2;
  return 2*R*Math.asin(Math.sqrt(Math.max(0,Math.min(1,x))));
}
function brgDeg(a,b,c,d){
  const dl=toR(d-b),y=Math.sin(dl)*Math.cos(toR(c)),x=Math.cos(toR(a))*Math.sin(toR(c))-Math.sin(toR(a))*Math.cos(toR(c))*Math.cos(dl);
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}
function drawRadar(){
  const cv=document.getElementById('radarCv');if(!cv)return;
  const dark=S.theme==='dark',W=cv.width=cv.offsetWidth,H=cv.height=cv.offsetHeight;
  const ctx=cv.getContext('2d'),cx=W/2,cy=H/2,R=Math.min(W,H)*.43;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=dark?'#040b16':'#e8f1fa';ctx.fillRect(0,0,W,H);
  [200,400,600].forEach(km=>{
    const rr=(km/MAX_KM)*R;
    ctx.beginPath();ctx.arc(cx,cy,rr,0,7);
    ctx.strokeStyle=dark?'rgba(20,70,130,.5)':'rgba(80,130,200,.3)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=dark?'rgba(80,140,200,.4)':'rgba(50,90,160,.45)';
    ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText(km+'km',cx+rr+3,cy);
  });
  ctx.strokeStyle=dark?'rgba(20,70,130,.35)':'rgba(80,130,200,.22)';ctx.lineWidth=.7;
  [[cx-R-4,cy,cx+R+4,cy],[cx,cy-R-4,cx,cy+R+4]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()});
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);
  ctx.strokeStyle=dark?'rgba(30,100,180,.65)':'rgba(70,120,200,.5)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(toR(S.sweep));
  const sg=ctx.createLinearGradient(0,0,0,-R);
  sg.addColorStop(0,dark?'rgba(30,200,255,0)':'rgba(10,100,200,0)');
  sg.addColorStop(1,dark?'rgba(30,200,255,.18)':'rgba(10,100,200,.1)');
  ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,-Math.PI/2,-Math.PI/2+Math.PI/3);ctx.closePath();
  ctx.fillStyle=sg;ctx.fill();
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-R);
  ctx.strokeStyle=dark?'rgba(30,200,255,.65)':'rgba(10,100,200,.5)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
  ctx.beginPath();ctx.arc(cx,cy,6,0,7);ctx.fillStyle=dark?'#2fd8c0':'#0d9488';ctx.fill();
  ctx.fillStyle=dark?'rgba(200,225,255,.8)':'rgba(20,50,100,.8)';
  ctx.font='700 10px "Segoe UI",sans-serif';ctx.textAlign='left';ctx.fillText('UTTT',cx+10,cy+4);ctx.textAlign='start';
  const allFlights=[...S.arrivals,...S.departures].filter(f=>f.live&&f.lat&&f.lon);
  allFlights.forEach(p=>{
    const dist=distKm(UTTT.lat,UTTT.lon,p.lat,p.lon);if(dist>MAX_KM)return;
    const brg=brgDeg(UTTT.lat,UTTT.lon,p.lat,p.lon),pr=(dist/MAX_KM)*R;
    const px=cx+Math.sin(toR(brg))*pr,py=cy-Math.cos(toR(brg))*pr;
    const col=p.status_color==='green'?(dark?'#22c55e':'#16a34a'):(dark?'#2fd8c0':'#0d9488');
    ctx.beginPath();ctx.arc(px,py,6,0,7);ctx.fillStyle=col+'26';ctx.fill();
    ctx.beginPath();ctx.arc(px,py,3.5,0,7);ctx.fillStyle=col;ctx.fill();
    const lbl=(p.flight||p.callsign||'').substring(0,8);
    ctx.fillStyle=dark?'rgba(180,215,255,.85)':'rgba(20,50,100,.85)';
    ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText(lbl,px+6,py-4);ctx.textAlign='start';
  });
  const liveN=allFlights.length;
  if(!liveN){
    ctx.fillStyle=dark?'rgba(80,140,200,.5)':'rgba(50,90,160,.5)';
    ctx.font='11px "Segoe UI",sans-serif';ctx.textAlign='center';
    ctx.fillText("Hozir havoda parvoz topilmadi",cx,cy+R+24);ctx.textAlign='start';
  }
  [['N',cx,cy-R-13],['E',cx+R+15,cy],['S',cx,cy+R+19],['W',cx-R-15,cy]].forEach(([l,x,y])=>{
    ctx.fillStyle=dark?'rgba(100,150,200,.55)':'rgba(60,100,160,.55)';
    ctx.font='10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(l,x,y);
  });
  ctx.textAlign='start';ctx.textBaseline='alphabetic';
}
function startRadar(){
  stopRadar();let last=0;
  function lp(t){S.rafId=requestAnimationFrame(lp);if(t-last<28)return;last=t;S.sweep=(S.sweep+1.6)%360;drawRadar()}
  S.rafId=requestAnimationFrame(lp);
}
function stopRadar(){if(S.rafId){cancelAnimationFrame(S.rafId);S.rafId=null}}

// ── Map ────────────────────────────────────────────────
function _ll(cb){
  if(window.L){cb();return}
  const lk=document.createElement('link');lk.rel='stylesheet';lk.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(lk);
  const sc=document.createElement('script');sc.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';sc.onload=cb;document.head.appendChild(sc);
}
function applyMapTheme(){
  const el=document.getElementById('xaritaEl');
  if(el)el.classList.toggle('lf-dark',S.theme==='dark');
}

function popupHtml(f,typ){
  const route=typ==='arr'
    ?`${f.airport_name||f.from} → TAS`
    :`TAS → ${f.airport_name||f.to}`;
  const arrow=typ==='arr'?'↓':'↑';
  const col=typ==='arr'?'var(--arr)':'var(--dep)';
  const ts=typ==='arr'?f.last_seen:f.first_seen;
  return `<div class="popup-flight" style="color:${col}">${arrow} ${f.flight||f.callsign||'—'}</div>
<div class="popup-route">${route}</div>
${f.aircraft?`<div style="font-size:11px;margin-top:4px;opacity:.7">${f.aircraft}${f.reg?' · '+f.reg:''}</div>`:''}
<div style="margin-top:6px">${statusTag(f,typ)}</div>
${ts?`<div style="font-size:11px;margin-top:4px;opacity:.7">Vaqt: ${fmtTs(ts)}</div>`:''}`;
}

function routeColor(f,typ){
  const dark=S.theme==='dark';
  if(f.status_color==='green')return dark?'#22c55e':'#16a34a';
  if(f.live)return dark?'#6ea8ff':'#2563eb';
  if(typ==='arr')return dark?'#2fd8c0':'#0d9488';
  return dark?'#f6a93b':'#b45309';
}

function routeOpacity(f){
  if(f.status_color==='green')return 0.55;
  if(f.live)return 0.9;
  return 0.35;
}

function initMap(){
  const el=document.getElementById('xaritaEl');if(!el)return;
  _ll(()=>{
    if(!S.map){
      const m=L.map(el,{center:[UTTT.lat,UTTT.lon],zoom:4,zoomControl:true});
      S.map=m;
      S.tileLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(m);
      applyMapTheme();
    }
    updateMapRoutes();
  });
}

function clearMapLayers(){
  S.layers.forEach(l=>{try{l.remove()}catch(e){}});
  S.layers=[];
}

function updateMapRoutes(){
  if(!S.map||!window.L)return;
  clearMapLayers();
  const dark=S.theme==='dark';

  // TAS central marker
  const tasCol=dark?'#2fd8c0':'#0d9488';
  const tasIcon=L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="${tasCol}" fill-opacity=".2" stroke="${tasCol}" stroke-width="2"/>
      <circle cx="12" cy="12" r="5" fill="${tasCol}"/>
    </svg>`,
    iconSize:[24,24],iconAnchor:[12,12],className:''
  });
  const tasMk=L.marker([UTTT.lat,UTTT.lon],{icon:tasIcon,zIndexOffset:1000}).addTo(S.map);
  tasMk.bindTooltip('<b>TAS — Toshkent</b><br>Islom Karimov xalqaro aeroporti',{direction:'right',permanent:false});
  S.layers.push(tasMk);

  // Draw routes
  const allFlights=[
    ...S.arrivals.map(f=>({...f,typ:'arr'})),
    ...S.departures.map(f=>({...f,typ:'dep'}))
  ];

  allFlights.forEach(f=>{
    const lat=f.lat, lon=f.lon;
    if(!lat||!lon)return;
    const typ=f.typ;
    const col=routeColor(f,typ);
    const opac=routeOpacity(f);
    const wt=f.live?2.5:f.status_color==='green'?1.5:1;

    // Route line: TAS ↔ airport
    const from=typ==='arr'?[lat,lon]:[UTTT.lat,UTTT.lon];
    const to=typ==='arr'?[UTTT.lat,UTTT.lon]:[lat,lon];
    const line=L.polyline([from,to],{color:col,weight:wt,opacity:opac,dashArray:f.live?null:'4 6'}).addTo(S.map);
    line.bindPopup(popupHtml(f,typ));
    S.layers.push(line);

    // Airport marker
    const sz=f.live?14:10;
    const arrow=typ==='arr'?'↓':'↑';
    const mkIcon=L.divIcon({
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};opacity:${f.live?1:.7};border:1.5px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:700">${f.live?arrow:''}</div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],className:''
    });
    const mk=L.marker([lat,lon],{icon:mkIcon}).addTo(S.map);
    mk.bindPopup(popupHtml(f,typ));
    S.layers.push(mk);
  });

  // Legend
  const liveArr=S.arrivals.filter(f=>f.live).length;
  const liveDep=S.departures.filter(f=>f.live).length;
  const landedArr=S.arrivals.filter(f=>f.status_color==='green').length;
  if(S._legendControl){try{S._legendControl.remove()}catch(e){}}
  const legend=L.control({position:'bottomleft'});
  legend.onAdd=()=>{
    const d=document.createElement('div');
    d.style.cssText=`background:${dark?'rgba(14,28,48,.92)':'rgba(255,255,255,.92)'};padding:8px 12px;border-radius:8px;font-size:11px;color:${dark?'#ddeaff':'#18273a'};border:1px solid ${dark?'#1a3050':'#cdd8ea'};line-height:1.8`;
    d.innerHTML=`<b>${S.arrivals.length} kelish · ${S.departures.length} ketish</b><br>`+
      `<span style="color:${dark?'#6ea8ff':'#2563eb'}">● </span>Havoda: ${liveArr+liveDep}<br>`+
      `<span style="color:${dark?'#22c55e':'#16a34a'}">● </span>Qo'ngan: ${landedArr}<br>`+
      `<span style="color:${dark?'#94a3b8':'#64748b'}">- - </span>Rejalashtirilgan`;
    return d;
  };
  legend.addTo(S.map);
  S._legendControl=legend;
}

// ── Data ───────────────────────────────────────────────
async function fetchData(force){
  if(S.loading&&!force)return;
  S.loading=true;setStatus('ld','Yangilanmoqda...');
  try{
    const fl=await fetch(`/api/flights?token=${TOKEN}`).then(r=>r.json()).catch(()=>({arrivals:[],departures:[],error:'Ulanish xatosi'}));
    S.arrivals=fl.arrivals||[];
    S.departures=fl.departures||[];
    S.planes=[];
    S.updAt=Math.floor(Date.now()/1000);S.error=fl.error||'';
    const tot=S.arrivals.length+S.departures.length;
    const live=S.arrivals.filter(f=>f.live).length+S.departures.filter(f=>f.live).length;
    const landed=S.arrivals.filter(f=>f.status_color==='green').length;
    if(S.error&&!tot)setStatus('err','FR24: '+S.error.slice(0,80));
    else setStatus('ok',`${tot} reys: ${S.arrivals.length}↓ kelish, ${S.departures.length}↑ ketish · Havoda: ${live} · Qo'ngan: ${landed}`);
  }catch(e){S.error=String(e);setStatus('err','Xatolik: '+S.error.slice(0,70))}
  S.loading=false;
  if(S.view==='tablo')renderTablo();
  if(S.view==='radar')drawRadar();
  if(S.view==='xarita')updateMapRoutes();
}

function boot(){
  setView('xarita');
  fetchData();
  setInterval(fetchData,60000);
}
document.addEventListener('DOMContentLoaded',boot);
</script>
