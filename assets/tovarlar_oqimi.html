<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>O'zbekistonga tovarlar oqimi</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased}
#wrap{position:relative;width:100%;height:100%;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
.gp{position:absolute;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:16px;z-index:20}
.seg-row{display:flex;gap:4px;padding:4px;border-radius:12px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.sb{appearance:none;border:none;cursor:pointer;padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:600;transition:all .15s;white-space:nowrap}
.lb{display:flex;align-items:center;gap:10px;width:100%;appearance:none;cursor:pointer;padding:9px 11px;border-radius:11px;font-size:13.5px;font-weight:600;transition:all .15s;text-align:left;border:1px solid transparent}
#tip{position:absolute;left:0;top:0;pointer-events:none;opacity:0;transform:translate(-9999px,-9999px);transition:opacity .12s;z-index:40;border-radius:11px;padding:11px 13px;font-family:"Segoe UI",sans-serif;font-size:13px;min-width:152px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
@keyframes ibkring{0%{transform:scale(.55);opacity:.85}70%{opacity:0}100%{transform:scale(1.7);opacity:0}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="titlePanel" class="gp" style="top:24px;left:26px;padding:16px 20px;max-width:340px"></div>
  <div id="ctrlPanel" style="position:absolute;top:24px;right:26px;display:flex;flex-direction:column;gap:10px;z-index:20">
    <div id="viewSeg" class="seg-row"></div>
    <div id="themeSeg" class="seg-row"></div>
  </div>
  <div id="legendPanel" class="gp" style="bottom:26px;left:26px;padding:15px 16px;width:286px;display:flex;flex-direction:column;gap:6px"></div>
  <div id="statPanel" class="gp" style="bottom:26px;right:26px;padding:16px 20px;min-width:232px"></div>
  <div id="tip"></div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || window.TOKEN || '';
const UZ = [69.2797, 41.3111];
const COL = { Avia: '#22d3ee', "Temir yo'l": '#f5b524', Avto: '#4ade80' };
const TRANSPORT_KEYS = ['Avia', "Temir yo'l", 'Avto'];

// ── Coordinate map ────────────────────────────────────────────────────────
const CC = [
  ['janubiy koreya',127.5,36.5],['shimoliy koreya',127.0,40.0],
  ['xitoy',104.2,35.9],['china',104.2,35.9],
  ['rossiya',50.0,56.0],['russia',50.0,56.0],
  ["qozog'iston",67.0,48.0],['qozog',67.0,48.0],['kazakh',67.0,48.0],
  ['koreya',127.5,36.5],['korea',127.5,36.5],
  ['turkiya',33.0,39.0],['turkey',33.0,39.0],
  ['germaniya',10.4,51.2],['germany',10.4,51.2],
  ['eron',53.0,32.4],['iran',53.0,32.4],
  ["qirg'iziston",74.7,41.4],['kyrgyz',74.7,41.4],['qirg',74.7,41.4],
  ['hindiston',78.0,22.0],['india',78.0,22.0],
  ['yaponiya',138.3,36.2],['japan',138.3,36.2],
  ['belarus',28.0,53.7],
  ['turkmaniston',59.0,39.0],['turkman',59.0,39.0],
  ['baa',54.0,24.0],['amirlik',54.0,24.0],['emirat',54.0,24.0],['uae',54.0,24.0],
  ['italiya',12.6,42.8],['italy',12.6,42.8],
  ['fransiya',2.2,46.2],['france',2.2,46.2],
  ['aqsh',-95.7,37.1],['usa',-95.7,37.1],['amerika',-95.7,37.1],
  ['polsha',19.2,51.9],['poland',19.2,51.9],
  ['ispaniya',-3.75,40.5],['spain',-3.75,40.5],
  ['belgiya',4.47,50.5],
  ['gruziya',44.0,41.7],['georgia',44.0,41.7],
  ['ozarbayjon',47.6,40.1],['azerbaijan',47.6,40.1],
  ['tojik',71.3,38.9],['tajik',71.3,38.9],
  ['afg',67.7,33.9],
  ['niderlandiya',5.3,52.1],['netherlands',5.3,52.1],['gollandiya',5.3,52.1],
  ['britaniya',-3.4,55.4],['united king',-3.4,55.4],['england',-0.1,51.5],
  ['saudiya',45.1,23.9],['saudi',45.1,23.9],
  ['misr',30.8,26.8],['egypt',30.8,26.8],
  ['pokiston',69.4,30.4],['pakistan',69.4,30.4],
  ['ukraina',31.2,48.4],['ukraine',31.2,48.4],
  ['latviya',24.6,56.9],['litva',23.9,55.2],
  ['avstriya',14.6,47.5],['singapur',103.8,1.35],
  ['vietnam',108.3,14.1],['malayziya',102.0,4.2],
  ['tayvan',121.0,23.7],['taiwan',121.0,23.7],
  ['chexiya',15.5,49.8],['vengriya',19.5,47.2],
  ['kanada',-106.4,56.1],['canada',-106.4,56.1],
  ['avstrali',133.8,-25.3],['australia',133.8,-25.3],
  ['isroil',34.85,31.05],['israel',34.85,31.05],
  ['portugal',-8.2,39.4],['gretsiya',23.7,38.0],
  ['shveysar',8.2,46.8],['switzerland',8.2,46.8],
  ['shvetsi',18.6,59.3],['sweden',18.6,59.3],
  ['bolgari',25.5,42.7],['bulgaria',25.5,42.7],
  ['belorus',28.0,53.7],
  ['vetnam',108.3,14.1],['vietnam',108.3,14.1],
  ['gonkon',114.2,22.3],['hong kong',114.2,22.3],['hongkong',114.2,22.3],
  ['daniy',10.3,56.3],['denmark',10.3,56.3],
  ['kipr',33.2,35.1],['cyprus',33.2,35.1],
  ['slovaki',19.5,48.7],['slovakia',19.5,48.7],
  ['serbi',21.0,44.0],['serbia',21.0,44.0],
  ['kuba',-77.8,21.5],['cuba',-77.8,21.5],
  ['rumini',24.97,45.94],['romani',24.97,45.94],
  ['indone',113.9,-0.8],['indonesia',113.9,-0.8],
  ['brazili',-52.0,-14.0],['brazil',-52.0,-14.0],
  ['armani',44.5,40.4],['armenia',44.5,40.4],
  ['estoni',24.7,58.9],['estonia',24.7,58.9],
  ['irland',-8.2,53.2],['ireland',-8.2,53.2],
  ['sloveni',14.8,46.2],['slovenia',14.8,46.2],
  ['banglad',90.4,23.7],['bangladesh',90.4,23.7],
  ['chehi',15.5,49.8],['czech',15.5,49.8],
  ['finlyan',25.0,61.9],['finland',25.0,61.9],
  ['norveg',10.7,59.9],['norway',10.7,59.9],
  ['tailand',100.9,15.9],['thailand',100.9,15.9],
  ['filippin',121.8,12.9],
  ['nigeriya',8.7,9.1],['nigeria',8.7,9.1],
  ['meksik',-102.6,23.6],['mexico',-102.6,23.6],
  ['argentin',-64.0,-34.0],['argentina',-64.0,-34.0],
];

function getCoord(name) {
  const s = String(name || '').toLowerCase();
  for (const r of CC) {
    if (s.includes(r[0])) return [r[1], r[2]];
  }
  return null;
}

// ── State ──────────────────────────────────────────────────────────────────
const S = {
  view: 'map',
  theme: 'light',
  f: { avia: true, temir: true, avto: true },
  rotate: [-69, -26],
  baseRot: [-69, -26],
  phase: 0,
  drag: null,
  flows: [],
  origins: [],
  dateLabel: '',
  aviaTotal: 0,
  temirTotal: 0,
  avtoTotal: 0,
};

let W = 0, H = 0, dpr = Math.min(2, window.devicePixelRatio || 1);
let land = null, borders = null, graticule = null;
const sphere = { type: 'Sphere' };
const region = { type: 'MultiPoint', coordinates: [[-2, 14], [148, 14], [148, 61], [-2, 61]] };
let rafId = null, run = false;

// ── Projection ─────────────────────────────────────────────────────────────
function proj() {
  const m = Math.min(W, H);
  if (S.view === 'globe') {
    return d3.geoOrthographic().scale(m * 0.46).translate([W / 2, H / 2]).rotate(S.rotate).clipAngle(90);
  }
  return d3.geoMercator().fitExtent([[18, 18], [W - 18, H - 18]], region);
}

// ── Build flows ─────────────────────────────────────────────────────────────
function buildFlows() {
  S.flows = [];
  const N = 96;
  const maxVal = Math.max(...S.origins.flatMap(o => TRANSPORT_KEYS.map(k => o[k] || 0)), 1);
  for (const o of S.origins) {
    for (const key of TRANSPORT_KEYS) {
      const val = o[key] || 0;
      if (val < 0.0001) continue;
      const interp = d3.geoInterpolate(o.coord, UZ);
      const pts = [];
      for (let i = 0; i <= N; i++) pts.push(interp(i / N));
      S.flows.push({
        key, val, pts, color: COL[key],
        parts: Math.max(1, Math.min(7, Math.round(7 * val / maxVal))),
        lw: Math.min(3.2, 0.6 + 2.6 * val / maxVal),
      });
    }
  }
}

// ── RGBA helper ────────────────────────────────────────────────────────────
function rgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}
function fmt(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }
function fmtMln(v) {
  if (v >= 1000) return (v / 1000).toFixed(1) + ' mlrd';
  return v.toFixed(1);
}

function domColor(o) {
  let best = 'Avia', bv = -1;
  for (const k of TRANSPORT_KEYS) {
    const active = k === 'Avia' ? S.f.avia : k === "Temir yo'l" ? S.f.temir : S.f.avto;
    if (active && (o[k] || 0) > bv) { bv = o[k] || 0; best = k; }
  }
  return COL[best];
}
function isOn(key) { return key === 'Avia' ? S.f.avia : key === "Temir yo'l" ? S.f.temir : S.f.avto; }
function isVis(co) {
  if (S.view !== 'globe') return true;
  const center = [-S.rotate[0], -S.rotate[1]];
  return d3.geoDistance(co, center) < Math.PI / 2 - 0.015;
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  const cv = document.getElementById('cv');
  if (!cv || !W) return;
  const ctx = cv.getContext('2d');
  const dark = S.theme === 'dark';
  const globe = S.view === 'globe';
  const mapMode = !globe;

  const C = dark
    ? { bg0:'#04060e',bg1:'#080d1a',ocean:'#0d2042',oceanHi:'#1b3c68',land:'#2c4e82',border:'rgba(150,185,240,0.32)',grat:'rgba(140,170,225,0.10)',sph:'rgba(90,155,240,0.55)' }
    : { bg0:'#eef2f8',bg1:'#dce5f1',ocean:'#bcccE2',oceanHi:'#d6e2f1',land:'#9fb4d2',border:'rgba(255,255,255,0.8)',grat:'rgba(80,110,155,0.16)',sph:'rgba(110,145,190,0.6)' };
  const carto = { water:'#bcd6dd',land:'#e8e1d0',border:'rgba(120,110,80,0.35)',coast:'rgba(120,130,100,0.5)',label:'#5a5234',halo:'rgba(255,255,255,0.9)' };

  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const p = proj();
  const path = d3.geoPath(p, ctx);

  if (globe) {
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, C.bg0); bg.addColorStop(1, C.bg1);
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    const cx = W / 2, cy = H / 2, rr = Math.min(W, H) * 0.46;
    const halo = ctx.createRadialGradient(cx, cy, rr * 0.7, cx, cy, rr * 1.35);
    halo.addColorStop(0, dark ? 'rgba(40,90,170,0.18)' : 'rgba(120,150,200,0.12)');
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(cx, cy, rr * 1.35, 0, 7); ctx.fill();
  } else {
    ctx.fillStyle = carto.water; ctx.fillRect(0, 0, W, H);
  }

  if (globe) {
    ctx.beginPath(); path(sphere);
    const cx2 = W / 2, cy2 = H / 2, rr2 = Math.min(W, H) * 0.46;
    const og = ctx.createRadialGradient(cx2 - rr2 * 0.32, cy2 - rr2 * 0.34, rr2 * 0.08, cx2, cy2, rr2 * 1.08);
    og.addColorStop(0, C.oceanHi); og.addColorStop(1, C.ocean);
    ctx.fillStyle = og; ctx.fill();
    ctx.beginPath(); path(graticule); ctx.strokeStyle = C.grat; ctx.lineWidth = 0.6; ctx.stroke();
  }

  if (land) {
    ctx.beginPath(); path(land); ctx.fillStyle = globe ? C.land : carto.land; ctx.fill();
    if (mapMode) { ctx.strokeStyle = carto.coast; ctx.lineWidth = 0.6; ctx.stroke(); }
    ctx.beginPath(); path(borders);
    ctx.strokeStyle = globe ? C.border : carto.border;
    ctx.lineWidth = globe ? 0.7 : 0.9; ctx.stroke();
  }
  if (globe) { ctx.beginPath(); path(sphere); ctx.strokeStyle = C.sph; ctx.lineWidth = 1.6; ctx.stroke(); }

  // Static arcs
  for (const fl of S.flows) {
    if (!isOn(fl.key)) continue;
    ctx.beginPath(); path({ type: 'LineString', coordinates: fl.pts });
    ctx.strokeStyle = rgba(fl.color, mapMode ? 0.32 : (dark ? 0.16 : 0.24));
    ctx.lineWidth = fl.lw; ctx.lineCap = 'round'; ctx.stroke();
  }

  // Animated particles
  const now = performance.now() / 1000;
  const PERIOD = 3.4;
  for (const fl of S.flows) {
    if (!isOn(fl.key)) continue;
    const head = Math.min(3.6, 1.5 + fl.lw * 0.8);
    for (let pp = 0; pp < fl.parts; pp++) {
      const phase = (now / PERIOD + pp / fl.parts) % 1;
      for (let st = 0; st < 5; st++) {
        const t = phase - st * 0.013;
        if (t < 0 || t > 1) continue;
        const idx = Math.round(t * (fl.pts.length - 1));
        const co = fl.pts[idx];
        if (!isVis(co)) continue;
        const xy = p(co); if (!xy) continue;
        const a = (1 - st / 5) * (dark ? 0.95 : 0.85);
        const rad = st === 0 ? head : Math.max(0.5, head * (1 - st / 5));
        if (st === 0) {
          ctx.beginPath(); ctx.arc(xy[0], xy[1], rad * 2.4, 0, 7);
          ctx.fillStyle = rgba(fl.color, 0.18); ctx.fill();
        }
        ctx.beginPath(); ctx.arc(xy[0], xy[1], rad, 0, 7);
        ctx.fillStyle = rgba(fl.color, a); ctx.fill();
      }
    }
  }

  // Origin markers
  const maxTot = Math.max(...S.origins.map(o => (o.Avia||0)+(o["Temir yo'l"]||0)+(o.Avto||0)), 1);
  for (const o of S.origins) {
    const tot = (S.f.avia ? (o.Avia || 0) : 0) + (S.f.temir ? (o["Temir yo'l"] || 0) : 0) + (S.f.avto ? (o.Avto || 0) : 0);
    if (tot <= 0 || !isVis(o.coord)) continue;
    const xy = p(o.coord); if (!xy) continue;
    const dom = domColor(o);
    const r = Math.max(2.4, 2 + 6 * tot / maxTot);
    ctx.beginPath(); ctx.arc(xy[0], xy[1], r + 3, 0, 7);
    ctx.strokeStyle = rgba(dom, 0.4); ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(xy[0], xy[1], r, 0, 7);
    ctx.fillStyle = rgba(dom, 0.95); ctx.fill();
  }

  // Country labels (map mode)
  if (mapMode) {
    ctx.font = '600 11px "Segoe UI", sans-serif';
    ctx.textBaseline = 'middle'; ctx.lineJoin = 'round';
    for (const o of S.origins) {
      const tot = (S.f.avia ? (o.Avia || 0) : 0) + (S.f.temir ? (o["Temir yo'l"] || 0) : 0) + (S.f.avto ? (o.Avto || 0) : 0);
      if (tot <= 0) continue;
      const xy = p(o.coord); if (!xy) continue;
      const right = xy[0] > W * 0.8;
      ctx.textAlign = right ? 'right' : 'left';
      const tx = xy[0] + (right ? -8 : 8), ty = xy[1] - 9;
      ctx.lineWidth = 3; ctx.strokeStyle = carto.halo; ctx.strokeText(o.name, tx, ty);
      ctx.fillStyle = carto.label; ctx.fillText(o.name, tx, ty);
    }
  }

  // Tashkent destination
  if (isVis(UZ)) {
    const xy = p(UZ); if (xy) {
      const fgDark = mapMode ? true : !dark;
      const pulse = (performance.now() % 1700) / 1700;
      ctx.beginPath(); ctx.arc(xy[0], xy[1], 6 + pulse * 22, 0, 7);
      ctx.strokeStyle = !fgDark ? `rgba(255,255,255,${(1-pulse)*0.5})` : `rgba(20,40,80,${(1-pulse)*0.45})`;
      ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(xy[0], xy[1], 5.5, 0, 7);
      ctx.fillStyle = !fgDark ? '#fff' : '#d6402f'; ctx.fill();
      ctx.beginPath(); ctx.arc(xy[0], xy[1], 2.6, 0, 7);
      ctx.fillStyle = !fgDark ? '#0a1020' : '#fff'; ctx.fill();
      ctx.font = '700 13px "Segoe UI", sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.lineJoin = 'round';
      if (fgDark) { ctx.lineWidth = 3.5; ctx.strokeStyle = 'rgba(255,255,255,0.92)'; ctx.strokeText('Toshkent', xy[0] + 11, xy[1] - 11); }
      ctx.fillStyle = !fgDark ? '#e6edff' : '#16203a';
      ctx.fillText('Toshkent', xy[0] + 11, xy[1] - 11);
    }
  }

  ctx.restore();
}

// ── Animation loop ─────────────────────────────────────────────────────────
function loop() {
  if (!run) return;
  rafId = requestAnimationFrame(loop);
  if (S.view === 'globe' && !S.drag) {
    S.phase += 0.0016 * 2;
    S.rotate = [S.baseRot[0] + Math.sin(S.phase) * 26, S.baseRot[1]];
  }
  draw();
}

// ── Resize ─────────────────────────────────────────────────────────────────
function resize() {
  const cv = document.getElementById('cv'), wrap = document.getElementById('wrap');
  if (!cv || !wrap) return;
  const r = wrap.getBoundingClientRect();
  W = Math.max(1, r.width); H = Math.max(1, r.height);
  cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
}

// ── Tooltip ────────────────────────────────────────────────────────────────
function hitTest(mx, my) {
  if (!W) return;
  const p = proj();
  let best = null, bd = 18;
  for (const o of S.origins) {
    const tot = (o.Avia || 0) + (o["Temir yo'l"] || 0) + (o.Avto || 0);
    if (tot <= 0) continue;
    if (!isVis(o.coord)) continue;
    const xy = p(o.coord); if (!xy) continue;
    const d = Math.hypot(xy[0] - mx, xy[1] - my);
    if (d < bd) { bd = d; best = { o, xy }; }
  }
  if (best) showTip(best.o, mx, my);
  else hideTip();
}

function showTip(o, mx, my) {
  const tip = document.getElementById('tip');
  if (!tip) return;
  const dark = S.theme === 'dark';
  const order = [['Avia','#22d3ee'], ["Temir yo'l",'#f5b524'], ['Avto','#4ade80']];
  const rows = order
    .filter(r => (r[0]==='Avia' ? S.f.avia : r[0]==="Temir yo'l" ? S.f.temir : S.f.avto) && (o[r[0]]||0) > 0)
    .map(r => `<div style="display:flex;align-items:center;gap:8px;margin-top:5px">
      <span style="width:8px;height:8px;border-radius:50%;background:${r[1]};flex:none"></span>
      <span style="flex:1">${r[0]}</span>
      <b style="font-variant-numeric:tabular-nums">${fmtMln(o[r[0]]||0)}</b>
    </div>`).join('');
  const tot = (S.f.avia ? (o.Avia||0) : 0) + (S.f.temir ? (o["Temir yo'l"]||0) : 0) + (S.f.avto ? (o.Avto||0) : 0);
  tip.innerHTML = `<div style="font-size:14px;font-weight:700;margin-bottom:2px">${o.name}</div>
    <div style="font-size:10.5px;opacity:.6;letter-spacing:.05em;text-transform:uppercase">Jami ${fmtMln(tot)} mln $</div>${rows}`;
  const left = mx > W - 190 ? mx - 175 : mx + 16;
  Object.assign(tip.style, {
    opacity: 1, left: left + 'px', top: (my + 16) + 'px', transform: 'none',
    background: dark ? 'rgba(10,16,30,0.92)' : 'rgba(255,255,255,0.95)',
    color: dark ? '#e6edff' : '#16203a',
    border: '1px solid ' + (dark ? 'rgba(120,150,205,0.25)' : 'rgba(20,40,80,0.12)'),
    boxShadow: `0 14px 34px rgba(0,0,0,${dark ? 0.55 : 0.18})`,
  });
}
function hideTip() {
  const tip = document.getElementById('tip');
  if (tip) { tip.style.opacity = 0; tip.style.transform = 'translate(-9999px,-9999px)'; }
}

// ── Drag / interact ────────────────────────────────────────────────────────
function bindCanvas() {
  const cv = document.getElementById('cv');
  if (!cv) return;
  cv.style.cursor = 'grab';
  const pos = e => { const r = cv.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; };
  cv.addEventListener('pointerdown', e => {
    if (S.view !== 'globe') return;
    S.drag = { x: e.clientX, y: e.clientY, r: [...S.rotate] };
    try { cv.setPointerCapture(e.pointerId); } catch {}
    cv.style.cursor = 'grabbing'; hideTip();
  });
  cv.addEventListener('pointermove', e => {
    if (S.drag) {
      const dx = e.clientX - S.drag.x, dy = e.clientY - S.drag.y;
      S.rotate = [S.drag.r[0] + dx * 0.32, Math.max(-82, Math.min(82, S.drag.r[1] - dy * 0.32))];
    } else { hitTest(...pos(e)); }
  });
  const up = () => {
    if (S.drag) {
      S.baseRot = [...S.rotate]; S.phase = 0; S.drag = null;
      cv.style.cursor = 'grab';
    }
  };
  cv.addEventListener('pointerup', up);
  cv.addEventListener('pointercancel', up);
  cv.addEventListener('pointerleave', hideTip);
}

// ── Panels ─────────────────────────────────────────────────────────────────
function renderPanels() {
  const dark = S.theme === 'dark';
  const glass = dark ? 'rgba(12,19,34,0.72)' : 'rgba(255,255,255,0.82)';
  const txt = dark ? '#e8eefc' : '#16203a';
  const sub = dark ? 'rgba(200,215,245,0.55)' : 'rgba(30,45,70,0.55)';
  const border = `1px solid ${dark ? 'rgba(120,150,205,0.18)' : 'rgba(20,40,80,0.10)'}`;
  const shadow = dark ? '0 18px 50px rgba(0,0,0,0.55)' : '0 18px 50px rgba(40,60,90,0.16)';
  const accent = dark ? '#3b82f6' : '#2563eb';

  // Apply glass to panel containers
  for (const id of ['titlePanel','legendPanel','statPanel']) {
    const el = document.getElementById(id);
    if (!el) continue;
    Object.assign(el.style, { background: glass, border, boxShadow: shadow, color: txt });
  }
  for (const id of ['viewSeg','themeSeg']) {
    const el = document.getElementById(id);
    if (!el) continue;
    Object.assign(el.style, { background: glass, border, boxShadow: shadow });
  }

  // Title panel
  const dateStr = S.dateLabel || '—';
  document.getElementById('titlePanel').innerHTML = `
    <div style="font-size:10.5px;letter-spacing:.15em;font-weight:700;color:${dark?'#5fb8ff':'#2f6fd0'};text-transform:uppercase;margin-bottom:7px">IBK dashboard</div>
    <div style="font-size:21px;font-weight:750;letter-spacing:-.01em;line-height:1.12;color:${txt}">"Toshkent-Aero" IBKga tovarlar oqimi</div>
    <div style="font-size:12px;color:${sub};margin-top:6px;line-height:1.4">Davlatlar kesimida · yil boshidan ${dateStr} holatiga</div>`;

  // Seg buttons helper
  const segBase = `appearance:none;border:none;cursor:pointer;padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:600;transition:all .15s;white-space:nowrap`;
  const seg = active => `${segBase};background:${active ? accent : 'transparent'};color:${active ? '#fff' : sub};box-shadow:${active ? '0 2px 8px rgba(59,130,246,0.35)' : 'none'}`;

  document.getElementById('viewSeg').innerHTML = `
    <button style="${seg(S.view==='globe')}" onclick="setView('globe')">Globus</button>
    <button style="${seg(S.view==='map')}" onclick="setView('map')">Xarita</button>`;
  document.getElementById('themeSeg').innerHTML = `
    <button style="${seg(S.theme==='dark')}" onclick="setTheme('dark')">Qorongʻiqi</button>
    <button style="${seg(S.theme==='light')}" onclick="setTheme('light')">Yorugʻ</button>`;

  // Transport legend
  const legBase = `display:flex;align-items:center;gap:10px;width:100%;appearance:none;cursor:pointer;padding:9px 11px;border-radius:11px;font-size:13.5px;font-weight:600;transition:all .15s;text-align:left`;
  const leg = active => `${legBase};background:${active ? (dark?'rgba(255,255,255,0.05)':'rgba(20,40,80,0.045)') : 'transparent'};border:1px solid ${active ? (dark?'rgba(120,150,205,0.16)':'rgba(20,40,80,0.08)') : 'transparent'};opacity:${active?1:0.4};color:${txt}`;

  const aviaVal = S.aviaTotal.toFixed(1);
  const temirVal = S.temirTotal.toFixed(1);
  const avtoVal = S.avtoTotal.toFixed(1);

  const aviaIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>`;
  const temirIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f5b524" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><rect x="6" y="3" width="12" height="13" rx="2.5"/><path d="M6 10h12"/><circle cx="9" cy="13" r="0.6" fill="#f5b524"/><circle cx="15" cy="13" r="0.6" fill="#f5b524"/><path d="M8 16l-2 4M16 16l2 4M9 20h6"/></svg>`;
  const avtoIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M2 6h11v9H2z"/><path d="M13 9h4l4 3v3h-8z"/><circle cx="6.5" cy="17.5" r="1.8"/><circle cx="17" cy="17.5" r="1.8"/></svg>`;
  const valStyle = `font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px;flex:none`;
  const unitStyle = `font-size:10px;font-weight:500;color:${sub}`;

  document.getElementById('legendPanel').innerHTML = `
    <div style="font-size:10px;letter-spacing:.12em;font-weight:700;color:${sub};text-transform:uppercase;margin-bottom:3px">TRANSPORT TURI · oqimni filtrlash</div>
    <button style="${leg(S.f.avia)}" onclick="toggleTransport('avia')">
      <span style="width:11px;height:11px;border-radius:50%;background:#22d3ee;box-shadow:0 0 12px #22d3ee;flex:none"></span>
      ${aviaIcon}
      <span style="flex:1;text-align:left">Avia</span>

    </button>
    <button style="${leg(S.f.temir)}" onclick="toggleTransport('temir')">
      <span style="width:11px;height:11px;border-radius:50%;background:#f5b524;box-shadow:0 0 12px #f5b524;flex:none"></span>
      ${temirIcon}
      <span style="flex:1;text-align:left">Temir yoʻl</span>
      <span style="${valStyle}">${temirVal} <span style="${unitStyle}">mln&nbsp;$</span></span>
    </button>
    <button style="${leg(S.f.avto)}" onclick="toggleTransport('avto')">
      <span style="width:11px;height:11px;border-radius:50%;background:#4ade80;box-shadow:0 0 12px #4ade80;flex:none"></span>
      ${avtoIcon}
      <span style="flex:1;text-align:left">Avto</span>
      <span style="${valStyle}">${avtoVal} <span style="${unitStyle}">mln&nbsp;$</span></span>
    </button>
    <div style="font-size:10.5px;color:${sub};margin-top:5px;line-height:1.35;font-style:italic">Chiziq qalinligi va oqim tezligi tovar hajmiga mutanosib</div>`;

  // Stats panel
  const total = (S.f.avia ? S.aviaTotal : 0) + (S.f.temir ? S.temirTotal : 0) + (S.f.avto ? S.avtoTotal : 0);
  const cc = S.origins.filter(o => (S.f.avia?(o.Avia||0):0)+(S.f.temir?(o["Temir yo'l"]||0):0)+(S.f.avto?(o.Avto||0):0)>0).length;
  const chipStyle = `display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${sub};padding:5px 10px;border-radius:8px;background:${dark?'rgba(255,255,255,0.05)':'rgba(20,40,80,0.05)'}`;
  const chipNum = `color:${txt};font-weight:700;font-size:12.5px`;

  document.getElementById('statPanel').innerHTML = `
    <div style="font-size:30px;font-weight:780;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;color:${dark?'#fff':'#0f1b30'}">${fmtMln(total)}<span style="font-size:14px;font-weight:600;color:${sub}"> mln $</span></div>
    <div style="font-size:11.5px;color:${sub};margin-top:7px;line-height:1.35;max-width:212px">tanlangan oqimlar boʻlicha jami import qiymati</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <span style="${chipStyle}"><b style="${chipNum}">${cc}</b> davlat</span>
      <span style="${chipStyle}"><b style="${chipNum}">3</b> transport kanali</span>
    </div>`;
}

// ── State setters ──────────────────────────────────────────────────────────
function setView(v) {
  S.view = v; hideTip(); renderPanels();
}
function setTheme(t) {
  S.theme = t; renderPanels();
}
function toggleTransport(key) {
  S.f[key] = !S.f[key]; renderPanels();
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [flowData, trData] = await Promise.all([
      fetch(`/api/country_flow?token=${TOKEN}`).then(r => r.json()).catch(() => ({ countries: [], date: '' })),
      fetch(`/api/country_transport?token=${TOKEN}`).then(r => r.json()).catch(() => ({})),
    ]);

    S.dateLabel = flowData.date || '';
    const countries = flowData.countries || [];

    let aviaSum = 0, temirSum = 0, avtoSum = 0;
    S.origins = [];

    for (const c of countries) {
      const coord = getCoord(c.name);
      if (!coord) continue;

      const totalMln = (c.qiymat || 0) / 1e6;
      if (totalMln < 0.001) continue;

      const tr = trData[c.name] || {};
      const trW = tr.transports || {};
      const aviaW = trW['Avia'] || 0;
      const temirW = trW["Temir yo'l"] || 0;
      const totalW = aviaW + temirW;

      let avia = 0, temir = 0;
      if (totalW > 0) {
        avia = totalMln * (aviaW / totalW);
        temir = totalMln * (temirW / totalW);
      } else if (tr.dominant === "Temir yo'l") {
        temir = totalMln;
      } else {
        avia = totalMln;
      }

      aviaSum += avia;
      temirSum += temir;

      S.origins.push({ name: c.name, coord, Avia: avia, "Temir yo'l": temir, Avto: 0 });
    }

    S.aviaTotal = aviaSum;
    S.temirTotal = temirSum;
    S.avtoTotal = avtoSum;

    buildFlows();
  } catch (e) {
    console.error('loadData:', e);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  resize();
  new ResizeObserver(resize).observe(document.getElementById('wrap'));
  bindCanvas();

  try {
    const w = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
    land = topojson.feature(w, w.objects.countries);
    borders = topojson.mesh(w, w.objects.countries, (a, b) => a !== b);
  } catch {}
  graticule = d3.geoGraticule10();

  await loadData();
  renderPanels();
  run = true;
  loop();
}

document.addEventListener('DOMContentLoaded', boot);
</script>
