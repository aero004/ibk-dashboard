<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05070f;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  button{font-family:inherit}
  @keyframes ibkring{0%{transform:scale(.55);opacity:.85}70%{opacity:0}100%{transform:scale(1.7);opacity:0}}
</style>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
</head>
<body>
<div id="wrap" style="position:relative;width:100%;height:100%;overflow:hidden"></div>
<div id="tip" style="position:absolute;left:0;top:0;pointer-events:none;opacity:0;transform:translate(-9999px,-9999px);transition:opacity .12s;z-index:40"></div>

<script>
const UZ = [69.2797, 41.3111];
const COL = { Avia: '#22d3ee', "Temir yo'l": '#f5b524', Avto: '#4ade80' };
const ORIGINS = [
  { name: 'Xitoy',          coord: [104.2, 35.9], Avia: 210, "Temir yo'l": 280, Avto: 70 },
  { name: 'Rossiya',        coord: [50.0, 56.0],  Avia: 70,  "Temir yo'l": 330, Avto: 140 },
  { name: "Qozog'iston",    coord: [67.0, 48.0],  Avia: 10,  "Temir yo'l": 150, Avto: 230 },
  { name: 'Janubiy Koreya', coord: [127.5, 36.5], Avia: 165, "Temir yo'l": 0,   Avto: 8 },
  { name: 'Turkiya',        coord: [33.0, 39.0],  Avia: 95,  "Temir yo'l": 6,   Avto: 88 },
  { name: 'Germaniya',      coord: [10.4, 51.2],  Avia: 110, "Temir yo'l": 22,  Avto: 48 },
  { name: 'Eron',           coord: [53.0, 32.4],  Avia: 9,   "Temir yo'l": 24,  Avto: 96 },
  { name: "Qirg'iziston",   coord: [74.7, 41.4],  Avia: 3,   "Temir yo'l": 7,   Avto: 72 },
  { name: 'Hindiston',      coord: [78.0, 22.0],  Avia: 60,  "Temir yo'l": 0,   Avto: 18 },
  { name: 'Yaponiya',       coord: [138.3, 36.2], Avia: 78,  "Temir yo'l": 0,   Avto: 5 },
  { name: 'Belarus',        coord: [28.0, 53.7],  Avia: 6,   "Temir yo'l": 40,  Avto: 55 },
  { name: 'Turkmaniston',   coord: [59.0, 39.0],  Avia: 4,   "Temir yo'l": 18,  Avto: 60 },
  { name: 'BAA',            coord: [54.0, 24.0],  Avia: 70,  "Temir yo'l": 0,   Avto: 14 },
  { name: 'Italiya',        coord: [12.6, 42.8],  Avia: 42,  "Temir yo'l": 4,   Avto: 30 },
];

// --- State ---
let state = { view: 'globe', theme: 'dark', f: { avia: true, temir: true, avto: true } };
let _baseRot = [-69, -26], _rotate = [-69, -26], _phase = 0, _drag = null;
let _dpr = Math.min(2, window.devicePixelRatio || 1);
let _w = 0, _h = 0, _run = false, _raf = null;
let _land = null, _borders = null, _graticule = null, _sphere = null, _region = null;
let _flows = [];
let canvas, ctx, wrap, tip;

function rgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function fmt(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }
function sum(k) { return ORIGINS.reduce((a, o) => a + o[k], 0); }
function dom(o, f) {
  let best = 'Avia', bv = -1;
  for (const k of ['Avia', "Temir yo'l", 'Avto']) {
    const active = k === 'Avia' ? f.avia : k === "Temir yo'l" ? f.temir : f.avto;
    if (active && o[k] > bv) { bv = o[k]; best = k; }
  }
  return COL[best];
}

function buildFlows() {
  _flows = [];
  const N = 96;
  for (const o of ORIGINS) {
    for (const key of ['Avia', "Temir yo'l", 'Avto']) {
      const val = o[key];
      if (!val) continue;
      const interp = d3.geoInterpolate(o.coord, UZ);
      const pts = [];
      for (let i = 0; i <= N; i++) pts.push(interp(i / N));
      _flows.push({ key, val, pts, color: COL[key], parts: Math.max(1, Math.min(7, Math.round(val / 22))) });
    }
  }
}

function proj() {
  const m = Math.min(_w, _h);
  if (state.view === 'globe') {
    return d3.geoOrthographic().scale(m * 0.46).translate([_w/2, _h/2]).rotate(_rotate).clipAngle(90);
  }
  const pad = 18;
  return d3.geoMercator().fitExtent([[pad,pad],[_w-pad,_h-pad]], _region);
}

function draw() {
  const s = state, dark = s.theme === 'dark';
  const globe = s.view === 'globe';
  const mapMode = !globe;
  const mapStyle = 'terrain';
  const fgDark = mapMode ? true : !dark;
  const C = dark
    ? { bg0:'#04060e',bg1:'#080d1a',ocean:'#0d2042',oceanHi:'#1b3c68',land:'#2c4e82',border:'rgba(150,185,240,0.32)',grat:'rgba(140,170,225,0.10)',sphere:'rgba(90,155,240,0.55)' }
    : { bg0:'#eef2f8',bg1:'#dce5f1',ocean:'#bcccE2',oceanHi:'#d6e2f1',land:'#9fb4d2',border:'rgba(255,255,255,0.8)',grat:'rgba(80,110,155,0.16)',sphere:'rgba(110,145,190,0.6)' };
  const CARTO = {
    terrain:{ water:'#bcd6dd',land:'#e8e1d0',border:'rgba(120,110,80,0.35)',coast:'rgba(120,130,100,0.5)',label:'#5a5234',halo:'rgba(255,255,255,0.9)' }
  };
  const carto = CARTO.terrain;
  const W = _w, H = _h;
  ctx.clearRect(0,0,W,H);
  const p = proj();
  const path = d3.geoPath(p, ctx);

  if (globe) {
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,C.bg0); bg.addColorStop(1,C.bg1);
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
    const cx=W/2,cy=H/2,rr=Math.min(W,H)*0.46;
    const halo = ctx.createRadialGradient(cx,cy,rr*0.7,cx,cy,rr*1.35);
    halo.addColorStop(0, dark?'rgba(40,90,170,0.18)':'rgba(120,150,200,0.12)');
    halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(cx,cy,rr*1.35,0,7); ctx.fill();
  } else {
    ctx.fillStyle=carto.water; ctx.fillRect(0,0,W,H);
  }

  if (globe) {
    ctx.beginPath(); path(_sphere);
    const cx2=W/2,cy2=H/2,rr2=Math.min(W,H)*0.46;
    const og=ctx.createRadialGradient(cx2-rr2*0.32,cy2-rr2*0.34,rr2*0.08,cx2,cy2,rr2*1.08);
    og.addColorStop(0,C.oceanHi); og.addColorStop(1,C.ocean);
    ctx.fillStyle=og; ctx.fill();
    ctx.beginPath(); path(_graticule); ctx.strokeStyle=C.grat; ctx.lineWidth=0.6; ctx.stroke();
  }
  if (_land) {
    ctx.beginPath(); path(_land); ctx.fillStyle=globe?C.land:carto.land; ctx.fill();
    if (mapMode) { ctx.strokeStyle=carto.coast; ctx.lineWidth=0.6; ctx.stroke(); }
    ctx.beginPath(); path(_borders); ctx.strokeStyle=globe?C.border:carto.border; ctx.lineWidth=globe?0.7:0.9; ctx.stroke();
  }
  if (globe) { ctx.beginPath(); path(_sphere); ctx.strokeStyle=C.sphere; ctx.lineWidth=1.6; ctx.stroke(); }

  const f = s.f;
  const center = [-_rotate[0], -_rotate[1]];
  const vis = co => !globe || d3.geoDistance(co, center) < Math.PI/2 - 0.015;
  const on = key => (key==='Avia'?f.avia:key==="Temir yo'l"?f.temir:f.avto);

  for (const fl of _flows) {
    if (!on(fl.key)) continue;
    ctx.beginPath(); path({type:'LineString',coordinates:fl.pts});
    ctx.strokeStyle=rgba(fl.color, mapMode?0.32:(dark?0.16:0.24));
    ctx.lineWidth=Math.min(3.2,0.5+fl.val/55);
    ctx.lineCap='round'; ctx.stroke();
  }

  const now2 = performance.now()/1000, PERIOD=3.4;
  for (const fl of _flows) {
    if (!on(fl.key)) continue;
    const head=Math.min(3.6,1.7+fl.val/110);
    for (let pp=0; pp<fl.parts; pp++) {
      const phase=(now2/PERIOD+pp/fl.parts)%1;
      for (let st=0; st<5; st++) {
        const t=phase-st*0.013;
        if (t<0||t>1) continue;
        const idx=Math.round(t*(fl.pts.length-1));
        const co=fl.pts[idx];
        if (!vis(co)) continue;
        const xy=p(co); if (!xy) continue;
        const a=(1-st/5)*(dark?0.95:0.85);
        const rad=st===0?head:Math.max(0.5,head*(1-st/5));
        if (st===0) { ctx.beginPath(); ctx.arc(xy[0],xy[1],rad*2.4,0,7); ctx.fillStyle=rgba(fl.color,0.18); ctx.fill(); }
        ctx.beginPath(); ctx.arc(xy[0],xy[1],rad,0,7); ctx.fillStyle=rgba(fl.color,a); ctx.fill();
      }
    }
  }

  for (const o of ORIGINS) {
    const tot=(f.avia?o.Avia:0)+(f.temir?o["Temir yo'l"]:0)+(f.avto?o.Avto:0);
    if (tot<=0||!vis(o.coord)) continue;
    const xy=p(o.coord); if (!xy) continue;
    const d2=dom(o,f), r=Math.max(2.4,2+tot/150);
    ctx.beginPath(); ctx.arc(xy[0],xy[1],r+3,0,7); ctx.strokeStyle=rgba(d2,0.4); ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.arc(xy[0],xy[1],r,0,7); ctx.fillStyle=rgba(d2,0.95); ctx.fill();
  }

  if (mapMode) {
    ctx.font='600 11px "Segoe UI", sans-serif';
    ctx.lineJoin='round';
    for (const o of ORIGINS) {
      const tot=(f.avia?o.Avia:0)+(f.temir?o["Temir yo'l"]:0)+(f.avto?o.Avto:0);
      if (tot<=0) continue;
      const xy=p(o.coord); if (!xy) continue;
      const right=xy[0]>_w*0.8;
      ctx.textAlign=right?'right':'left';
      const tx=xy[0]+(right?-8:8), ty=xy[1]-9;
      ctx.lineWidth=3; ctx.strokeStyle=carto.halo; ctx.strokeText(o.name,tx,ty);
      ctx.fillStyle=carto.label; ctx.fillText(o.name,tx,ty);
    }
  }

  if (vis(UZ)) {
    const xy=p(UZ);
    const pulse=(performance.now()%1700)/1700;
    ctx.beginPath(); ctx.arc(xy[0],xy[1],6+pulse*22,0,7);
    ctx.strokeStyle=!fgDark?`rgba(255,255,255,${(1-pulse)*0.5})`:`rgba(20,40,80,${(1-pulse)*0.45})`;
    ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(xy[0],xy[1],5.5,0,7); ctx.fillStyle=!fgDark?'#fff':'#d6402f'; ctx.fill();
    ctx.beginPath(); ctx.arc(xy[0],xy[1],2.6,0,7); ctx.fillStyle=!fgDark?'#0a1020':'#fff'; ctx.fill();
    ctx.font='700 13px "Segoe UI", sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.lineJoin='round';
    if (fgDark) { ctx.lineWidth=3.5; ctx.strokeStyle='rgba(255,255,255,0.92)'; ctx.strokeText('Toshkent',xy[0]+11,xy[1]-11); }
    ctx.fillStyle=!fgDark?'#e6edff':'#16203a';
    ctx.fillText('Toshkent',xy[0]+11,xy[1]-11);
  }
}

function loop() {
  if (!_run) return;
  _raf = requestAnimationFrame(loop);
  if (!canvas||!_w) return;
  if (state.view==='globe'&&!_drag) {
    _phase += 0.0016;
    _rotate = [_baseRot[0]+Math.sin(_phase)*26, _baseRot[1]];
  }
  ctx.save(); ctx.scale(_dpr,_dpr); draw(); ctx.restore();
}

function resize() {
  const r = wrap.getBoundingClientRect();
  _w = Math.max(1,r.width); _h = Math.max(1,r.height);
  canvas.width = Math.round(_w*_dpr); canvas.height = Math.round(_h*_dpr);
}

function hitTest(mx,my) {
  if (!_w) return;
  const p = proj();
  const center = [-_rotate[0],-_rotate[1]];
  let best=null, bd=18;
  for (const o of ORIGINS) {
    const tot=o.Avia+o["Temir yo'l"]+o.Avto;
    if (tot<=0) continue;
    if (state.view==='globe' && d3.geoDistance(o.coord,center)>=Math.PI/2) continue;
    const xy=p(o.coord); if (!xy) continue;
    const d2=Math.hypot(xy[0]-mx,xy[1]-my);
    if (d2<bd) { bd=d2; best={o,xy}; }
  }
  if (best) showTip(best.o,mx,my); else hideTip();
}

function showTip(o,mx,my) {
  const dark=state.theme==='dark', f=state.f;
  const order=[['Avia','#22d3ee'],["Temir yo'l",'#f5b524'],['Avto','#4ade80']];
  const rows=order
    .filter(r=>(r[0]==='Avia'?f.avia:r[0]==="Temir yo'l"?f.temir:f.avto)&&o[r[0]]>0)
    .map(r=>`<div style="display:flex;align-items:center;gap:8px;margin-top:5px"><span style="width:8px;height:8px;border-radius:50%;background:${r[1]};flex:none"></span><span style="flex:1">${r[0]}</span><b style="font-variant-numeric:tabular-nums">${fmt(o[r[0]])}</b></div>`)
    .join('');
  const tot=(f.avia?o.Avia:0)+(f.temir?o["Temir yo'l"]:0)+(f.avto?o.Avto:0);
  tip.innerHTML=`<div style="font-size:14px;font-weight:700;margin-bottom:2px">${o.name}</div><div style="font-size:10.5px;opacity:.6;letter-spacing:.05em;text-transform:uppercase">Jami ${fmt(tot)} mln $</div>${rows}`;
  const left=mx>_w-190?mx-175:mx+16;
  Object.assign(tip.style,{
    opacity:1,left:left+'px',top:(my+16)+'px',transform:'none',
    background:dark?'rgba(10,16,30,0.92)':'rgba(255,255,255,0.95)',
    color:dark?'#e6edff':'#16203a',
    border:'1px solid '+(dark?'rgba(120,150,205,0.25)':'rgba(20,40,80,0.12)'),
    borderRadius:'11px',padding:'11px 13px',
    font:'13px "Segoe UI", sans-serif',
    boxShadow:'0 14px 34px rgba(0,0,0,'+(dark?0.55:0.18)+')',
    minWidth:'152px',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',
  });
}
function hideTip() { tip.style.opacity=0; tip.style.transform='translate(-9999px,-9999px)'; }

function buildUI() {
  const dark=state.theme==='dark';
  const glass=dark?'rgba(12,19,34,0.72)':'rgba(255,255,255,0.82)';
  const txt=dark?'#e8eefc':'#16203a';
  const sub=dark?'rgba(200,215,245,0.55)':'rgba(30,45,70,0.55)';
  const border='1px solid '+(dark?'rgba(120,150,205,0.18)':'rgba(20,40,80,0.10)');
  const shadow=dark?'0 18px 50px rgba(0,0,0,0.55)':'0 18px 50px rgba(40,60,90,0.16)';
  const accent=dark?'#3b82f6':'#2563eb';
  const panel=`position:absolute;background:${glass};backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:${border};border-radius:16px;box-shadow:${shadow};color:${txt};z-index:20`;
  const segBase=`appearance:none;border:none;cursor:pointer;padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:600;transition:all .15s;white-space:nowrap;font-family:inherit`;
  const seg=(a)=>`${segBase};background:${a?accent:'transparent'};color:${a?'#fff':sub};box-shadow:${a?'0 2px 8px rgba(59,130,246,0.35)':'none'}`;
  const legBase=`display:flex;align-items:center;gap:10px;width:100%;appearance:none;cursor:pointer;padding:9px 11px;border-radius:11px;font-size:13.5px;font-weight:600;transition:all .15s;color:${txt};text-align:left;font-family:inherit`;
  const leg=(a)=>`${legBase};background:${a?(dark?'rgba(255,255,255,0.05)':'rgba(20,40,80,0.045)'):'transparent'};border:1px solid ${a?(dark?'rgba(120,150,205,0.16)':'rgba(20,40,80,0.08)'):'transparent'};opacity:${a?1:0.4}`;
  const f=state.f;
  const totalVal=(f.avia?sum('Avia'):0)+(f.temir?sum("Temir yo'l"):0)+(f.avto?sum('Avto'):0);
  const cc=ORIGINS.filter(o=>(f.avia?o.Avia:0)+(f.temir?o["Temir yo'l"]:0)+(f.avto?o.Avto:0)>0).length;

  wrap.innerHTML=`
    <canvas id="flowCanvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none"></canvas>

    <div style="${panel};top:24px;left:26px;padding:16px 20px;max-width:340px">
      <div style="font-size:10.5px;letter-spacing:0.15em;font-weight:700;color:${dark?'#5fb8ff':'#2f6fd0'};text-transform:uppercase;margin-bottom:7px">DAVLAT BOJXONA QO'MITASI · IBK NAZORATI</div>
      <div style="font-size:21px;font-weight:750;letter-spacing:-0.01em;line-height:1.12;color:${txt}">O'zbekistonga tovarlar oqimi</div>
      <div style="font-size:12px;color:${sub};margin-top:6px;line-height:1.4">Davlatlar kesimida · namuna ma'lumotlari</div>
    </div>

    <div style="position:absolute;top:24px;right:26px;display:flex;flex-direction:column;gap:10px;z-index:20">
      <div style="display:flex;gap:4px;padding:4px;background:${glass};backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:${border};border-radius:12px;box-shadow:${shadow}">
        <button onclick="setView('globe')" style="${seg(state.view==='globe')}">Globus</button>
        <button onclick="setView('map')" style="${seg(state.view==='map')}">Xarita</button>
      </div>
      <div style="display:flex;gap:4px;padding:4px;background:${glass};backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:${border};border-radius:12px;box-shadow:${shadow}">
        <button onclick="setTheme('dark')" style="${seg(state.theme==='dark')}">Qorong'i</button>
        <button onclick="setTheme('light')" style="${seg(state.theme==='light')}">Yorug'</button>
      </div>
    </div>

    <div style="${panel};bottom:26px;left:26px;padding:15px 16px;width:286px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:10px;letter-spacing:0.12em;font-weight:700;color:${sub};text-transform:uppercase;margin-bottom:3px">TRANSPORT TURI · oqimni filtrlash</div>
      <button onclick="toggleF('avia')" style="${leg(f.avia)}">
        <span style="width:11px;height:11px;border-radius:50%;background:#22d3ee;box-shadow:0 0 12px #22d3ee;flex:none"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>
        <span style="flex:1;text-align:left">Avia</span>
        <span style="font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px;flex:none">${fmt(sum('Avia'))} <span style="font-size:10px;font-weight:500;color:${sub}">mln&nbsp;$</span></span>
      </button>
      <button onclick="toggleF('temir')" style="${leg(f.temir)}">
        <span style="width:11px;height:11px;border-radius:50%;background:#f5b524;box-shadow:0 0 12px #f5b524;flex:none"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f5b524" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><rect x="6" y="3" width="12" height="13" rx="2.5"/><path d="M6 10h12"/><circle cx="9" cy="13" r="0.6" fill="#f5b524"/><circle cx="15" cy="13" r="0.6" fill="#f5b524"/><path d="M8 16l-2 4M16 16l2 4M9 20h6"/></svg>
        <span style="flex:1;text-align:left">Temir yo'l</span>
        <span style="font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px;flex:none">${fmt(sum("Temir yo'l"))} <span style="font-size:10px;font-weight:500;color:${sub}">mln&nbsp;$</span></span>
      </button>
      <button onclick="toggleF('avto')" style="${leg(f.avto)}">
        <span style="width:11px;height:11px;border-radius:50%;background:#4ade80;box-shadow:0 0 12px #4ade80;flex:none"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M2 6h11v9H2z"/><path d="M13 9h4l4 3v3h-8z"/><circle cx="6.5" cy="17.5" r="1.8"/><circle cx="17" cy="17.5" r="1.8"/></svg>
        <span style="flex:1;text-align:left">Avto</span>
        <span style="font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px;flex:none">${fmt(sum('Avto'))} <span style="font-size:10px;font-weight:500;color:${sub}">mln&nbsp;$</span></span>
      </button>
      <div style="font-size:10.5px;color:${sub};margin-top:5px;line-height:1.35;font-style:italic">Chiziq qalinligi va oqim tezligi tovar hajmiga mutanosib</div>
    </div>

    <div style="${panel};bottom:26px;right:26px;padding:16px 20px;min-width:232px">
      <div style="font-size:30px;font-weight:780;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1;color:${dark?'#fff':'#0f1b30'}">${fmt(totalVal)}<span style="font-size:14px;font-weight:600;color:${sub}"> mln $</span></div>
      <div style="font-size:11.5px;color:${sub};margin-top:7px;line-height:1.35;max-width:212px">tanlangan oqimlar bo'yicha jami import qiymati</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${sub};padding:5px 10px;border-radius:8px;background:${dark?'rgba(255,255,255,0.05)':'rgba(20,40,80,0.05)'}"><b style="color:${txt};font-weight:700;font-size:12.5px">${cc}</b> davlat</span>
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${sub};padding:5px 10px;border-radius:8px;background:${dark?'rgba(255,255,255,0.05)':'rgba(20,40,80,0.05)'}"><b style="color:${txt};font-weight:700;font-size:12.5px">3</b> transport kanali</span>
      </div>
    </div>
  `;

  canvas = document.getElementById('flowCanvas');
  ctx = canvas.getContext('2d');
  resize();
  bindCanvas();
}

function bindCanvas() {
  if (!canvas) return;
  canvas.style.cursor = 'grab';
  const pos = e => { const r=canvas.getBoundingClientRect(); return [e.clientX-r.left,e.clientY-r.top]; };
  canvas.addEventListener('pointerdown', e => {
    if (state.view!=='globe') return;
    _drag={x:e.clientX,y:e.clientY,r:[..._rotate]};
    try{canvas.setPointerCapture(e.pointerId);}catch(err){}
    canvas.style.cursor='grabbing'; hideTip();
  });
  canvas.addEventListener('pointermove', e => {
    if (_drag) {
      const dx=e.clientX-_drag.x, dy=e.clientY-_drag.y;
      _rotate=[_drag.r[0]+dx*0.32, Math.max(-82,Math.min(82,_drag.r[1]-dy*0.32))];
    } else { hitTest(...pos(e)); }
  });
  const up=()=>{ if(_drag){_drag=null;_baseRot=[..._rotate];_phase=0;canvas.style.cursor='grab';} };
  canvas.addEventListener('pointerup',up);
  canvas.addEventListener('pointercancel',up);
  canvas.addEventListener('pointerleave',()=>hideTip());
}

function setView(v) { state.view=v; buildUI(); }
function setTheme(t) { state.theme=t; document.body.style.background=t==='dark'?'#05070f':'#eef2f8'; buildUI(); }
function toggleF(k) { state.f[k]=!state.f[k]; buildUI(); }

window.setView=setView; window.setTheme=setTheme; window.toggleF=toggleF;

async function init() {
  wrap = document.getElementById('wrap');
  tip  = document.getElementById('tip');

  await new Promise(res => {
    const t=()=>{ if(window.d3&&window.topojson)res(); else setTimeout(t,40); };
    t();
  });

  try {
    const w = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json());
    _land = topojson.feature(w, w.objects.countries);
    _borders = topojson.mesh(w, w.objects.countries,(a,b)=>a!==b);
  } catch(e) { _land=null; }

  _graticule = d3.geoGraticule10();
  _sphere = {type:'Sphere'};
  _region = {type:'MultiPoint',coordinates:[[-2,14],[148,14],[148,61],[-2,61]]};
  buildFlows();
  buildUI();

  const ro = new ResizeObserver(()=>{ resize(); });
  ro.observe(wrap);

  _run=true; loop();
}

init();
</script>
